<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Fontologist — Embossed Mockup</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: #d4d0c8;
  font-family: 'Cormorant Garamond', Georgia, serif;
}

.card {
  width: 900px;
  height: 560px;
  background: #e8e4dc;
  /* Linen texture */
  background-image:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 1px,
      rgba(0,0,0,0.015) 1px,
      rgba(0,0,0,0.015) 2px
    ),
    repeating-linear-gradient(
      90deg,
      transparent,
      transparent 1px,
      rgba(0,0,0,0.01) 1px,
      rgba(0,0,0,0.01) 2px
    );
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  box-shadow:
    0 2px 20px rgba(0,0,0,0.08),
    0 8px 40px rgba(0,0,0,0.06);
  border-radius: 2px;
}

/* Embossed / debossed text effect */
.embossed {
  color: transparent;
  text-transform: uppercase;
  letter-spacing: 0.18em;
  font-weight: 400;
  /* Light coming from top-left:
     - top-left shadow is lighter (highlight)
     - bottom-right shadow is darker (shadow) */
  text-shadow:
    /* Inner highlight — top-left light catch */
    -1px -1px 1px rgba(255,255,255,0.8),
    /* Inner shadow — bottom-right depth */
    1px 1px 2px rgba(0,0,0,0.12),
    /* Softer outer highlight */
    -2px -2px 3px rgba(255,255,255,0.5),
    /* Softer outer shadow */
    2px 2px 4px rgba(0,0,0,0.08);
  /* Make the text body match the background */
  -webkit-text-stroke: 0.5px rgba(210,206,198,0.6);
  background: linear-gradient(
    145deg,
    rgba(240,236,228,0.9) 0%,
    rgba(225,221,213,0.95) 40%,
    rgba(215,211,203,1) 60%,
    rgba(232,228,220,0.9) 100%
  );
  -webkit-background-clip: text;
  background-clip: text;
}

.title-main {
  font-size: 110px;
  line-height: 0.95;
  margin-bottom: 8px;
}

.title-sub {
  font-size: 110px;
  line-height: 0.95;
}

.subtitle {
  margin-top: 48px;
  font-size: 16px;
  font-weight: 300;
  font-style: italic;
  letter-spacing: 0.3em;
  color: rgba(160,155,145,0.7);
  text-transform: none;
}

.tagline {
  margin-top: 12px;
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 0.35em;
  text-transform: uppercase;
  color: transparent;
  text-shadow:
    -1px -1px 1px rgba(255,255,255,0.6),
    1px 1px 1.5px rgba(0,0,0,0.08);
  -webkit-text-stroke: 0.3px rgba(210,206,198,0.4);
  background: linear-gradient(
    145deg,
    rgba(235,231,223,0.9) 0%,
    rgba(220,216,208,0.95) 50%,
    rgba(230,226,218,0.9) 100%
  );
  -webkit-background-clip: text;
  background-clip: text;
}
</style>
</head>
<body>

<div class="card">
  <div class="embossed title-main">The</div>
  <div class="embossed title-sub">Fontologist</div>
  <div class="subtitle">Semantic Typography Engine</div>
  <div class="tagline">Cross-modal typographic retrieval</div>
</div>

</body>
</html>
