<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Fontologist — by Equinox Design</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Montserrat:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
@font-face {
  font-family: 'The Seasons';
  src: url('fonts/TheSeasons-Regular.otf') format('opentype');
  font-weight: 400;
  font-style: normal;
}
@font-face {
  font-family: 'The Seasons';
  src: url('fonts/TheSeasons-It.otf') format('opentype');
  font-weight: 400;
  font-style: italic;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --navy: #243b53;
  --navy-deep: #1a2b42;
  --teal: #2a4a3e;
  --dark-gradient: linear-gradient(160deg, #2a4560 0%, #325770 30%, #2f5548 70%, #274a38 100%);
  --silver: #e0e5ed;
  --silver-light: #f0f2f6;
  --text-light: rgba(255,255,255,0.92);
  --text-dim: rgba(255,255,255,0.65);
  --text-faint: rgba(255,255,255,0.35);
  --glass: rgba(255,255,255,0.09);
  --glass-strong: rgba(255,255,255,0.13);
  --glass-border: rgba(255,255,255,0.18);
  --glass-border-dim: rgba(255,255,255,0.10);
  --font-heading: 'Cormorant Garamond', Georgia, serif;
  --font-body: 'Montserrat', -apple-system, sans-serif;
}

html, body {
  height: 100%;
  background: var(--navy);
  color: var(--text-light);
  font-family: var(--font-body);
  font-weight: 300;
  -webkit-font-smoothing: antialiased;
}

body {
  background: var(--dark-gradient);
  background-attachment: fixed;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  padding: 48px 20px 40px;
}

.container {
  width: 100%;
  max-width: 760px;
}

/* ---- Header ---- */
.header {
  text-align: center;
  margin-bottom: 40px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--glass-border-dim);
}

.header-logo {
  width: 80px;
  height: 80px;
  margin: 0 auto 20px;
  border-radius: 16px;
  overflow: hidden;
}

.header-logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.header h1 {
  margin-bottom: 8px;
}

.title-img {
  height: 40px;
  width: auto;
  filter: invert(1) brightness(0.88);
  opacity: 0.92;
}

.header .tagline {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 300;
  color: var(--text-faint);
  letter-spacing: 0.2em;
  text-transform: uppercase;
}

.header .byline {
  font-family: var(--font-body);
  font-size: 9px;
  font-weight: 400;
  color: var(--text-faint);
  letter-spacing: 0.15em;
  text-transform: uppercase;
  margin-top: 6px;
  opacity: 0.7;
}

/* ---- Glass panel ---- */
.glass-panel {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  padding: 28px;
  margin-bottom: 24px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 8px 32px rgba(0,0,0,0.2);
}

/* ---- API Key ---- */
.api-key-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.api-key-row input {
  flex: 1;
  background: rgba(0,0,0,0.25);
  border: 1px solid var(--glass-border-dim);
  border-radius: 6px;
  padding: 10px 14px;
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 300;
  color: var(--silver);
  outline: none;
  transition: border-color 0.2s;
  letter-spacing: 0.03em;
}

.api-key-row input:focus {
  border-color: var(--glass-border);
}

.api-key-row input::placeholder {
  color: var(--text-faint);
}

.btn-glass {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 6px;
  padding: 10px 18px;
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--silver);
  cursor: pointer;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
  white-space: nowrap;
}

.btn-glass:hover {
  background: var(--glass-strong);
  border-color: rgba(255,255,255,0.28);
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
}

.btn-glass:active {
  transform: scale(0.98);
}

.btn-glass.saved {
  border-color: rgba(120,200,160,0.4);
  color: rgba(120,200,160,0.9);
}

/* ---- Search ---- */
.search-row {
  display: flex;
  gap: 10px;
}

.search-row input {
  flex: 1;
  background: rgba(0,0,0,0.25);
  border: 1px solid var(--glass-border-dim);
  border-radius: 8px;
  padding: 16px 20px;
  font-family: var(--font-body);
  font-size: 16px;
  font-weight: 300;
  color: var(--silver-light);
  outline: none;
  transition: border-color 0.2s;
  letter-spacing: 0.02em;
}

.search-row input:focus {
  border-color: var(--glass-border);
}

.search-row input::placeholder {
  color: var(--text-faint);
  font-weight: 200;
}

.search-row .btn-glass {
  padding: 16px 28px;
  font-size: 11px;
  border-radius: 8px;
}

.search-row .btn-glass:disabled {
  opacity: 0.35;
  cursor: not-allowed;
}

/* ---- Status ---- */
.status {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 300;
  color: var(--text-faint);
  text-align: center;
  margin: 20px 0 8px;
  min-height: 18px;
  letter-spacing: 0.04em;
}

.status.error {
  color: rgba(200,100,100,0.8);
}

/* ---- Results ---- */
.results {
  display: flex;
  flex-direction: column;
  gap: 20px;
}

.card {
  background: var(--glass);
  border: 1px solid var(--glass-border-dim);
  border-radius: 12px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  overflow: hidden;
  transition: border-color 0.25s, box-shadow 0.25s;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}

.card:hover {
  border-color: var(--glass-border);
  box-shadow: 0 8px 32px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.06);
}

.card-specimen {
  padding: 44px 24px;
  text-align: center;
  border-bottom: 1px solid var(--glass-border-dim);
  min-height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.12);
}

.card-specimen .word {
  font-size: 56px;
  line-height: 1.2;
  color: var(--silver-light);
  transition: opacity 0.4s;
}

.card-specimen .word.loading {
  opacity: 0.15;
}

.card-specimen .font-error {
  font-family: var(--font-body);
  font-size: 11px;
  font-weight: 300;
  color: rgba(200,100,100,0.7);
}

.card-body {
  padding: 22px 24px 24px;
}

.card-name {
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 10px;
}

.card-rationale {
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 300;
  line-height: 1.7;
  color: var(--text-dim);
  margin-bottom: 14px;
}

.card-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}

.pill {
  font-family: var(--font-body);
  font-size: 9px;
  font-weight: 400;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-faint);
  border: 1px solid var(--glass-border-dim);
  background: rgba(255,255,255,0.04);
  padding: 4px 10px;
  border-radius: 20px;
}

/* ---- Collapsible match detail ---- */
.attr-toggle {
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--text-faint);
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px 0;
  display: flex;
  align-items: center;
  gap: 7px;
  transition: color 0.2s;
}

.attr-toggle:hover {
  color: var(--text-dim);
}

.attr-toggle .arrow {
  display: inline-block;
  transition: transform 0.2s;
  font-size: 8px;
}

.attr-toggle.open .arrow {
  transform: rotate(90deg);
}

.attr-profile {
  display: none;
  padding-top: 14px;
}

.attr-profile.open {
  display: block;
}

.attr-bar-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 9px;
}

.attr-bar-label {
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 300;
  color: var(--text-faint);
  width: 100px;
  text-align: right;
  flex-shrink: 0;
  letter-spacing: 0.04em;
}

.attr-bar-track {
  flex: 1;
  height: 3px;
  background: rgba(255,255,255,0.06);
  border-radius: 2px;
  overflow: hidden;
}

.attr-bar-fill {
  height: 100%;
  background: rgba(224,229,237,0.3);
  border-radius: 2px;
  transition: width 0.5s ease;
}

.attr-bar-value {
  font-family: var(--font-body);
  font-size: 10px;
  font-weight: 300;
  color: var(--text-faint);
  width: 28px;
  flex-shrink: 0;
}

/* ---- Footer ---- */
.footer {
  margin-top: 48px;
  padding-top: 24px;
  border-top: 1px solid var(--glass-border-dim);
  text-align: center;
}

.footer-brand {
  font-family: var(--font-heading);
  font-size: 13px;
  font-weight: 400;
  letter-spacing: 0.12em;
  color: var(--text-faint);
  margin-bottom: 6px;
}

.footer-sub {
  font-family: var(--font-body);
  font-size: 9px;
  font-weight: 300;
  color: var(--text-faint);
  letter-spacing: 0.06em;
  opacity: 0.6;
}

/* ---- Responsive ---- */
@media (max-width: 560px) {
  body { padding: 24px 12px 32px; }
  .glass-panel { padding: 20px 16px; }
  .card-specimen .word { font-size: 36px; }
  .card-specimen { padding: 28px 16px; }
  .card-body { padding: 16px; }
  .header h1 { font-size: 28px; }
  .header-logo { width: 60px; height: 60px; }
  .footer { flex-direction: column; text-align: center; }
  .api-key-row { flex-direction: column; }
  .search-row { flex-direction: column; }
}
</style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="header-logo">
      <img src="images/fontologist-logo.png" alt="The Fontologist">
    </div>
    <h1><img src="images/fontologist-title.png" alt="The Fontologist" class="title-img"></h1>
    <div class="tagline">Describe your vision. Get the perfect typeface.</div>
    <div class="byline">by Equinox Design</div>
  </div>

  <!-- Input panel -->
  <div class="glass-panel">
    <div class="api-key-row">
      <input type="password" id="apiKeyInput" placeholder="API key" autocomplete="off">
      <button class="btn-glass" id="saveKeyBtn" onclick="saveKey()">Save Key</button>
    </div>
    <div class="search-row">
      <input type="text" id="queryInput" placeholder="A word, a mood, a concept..." autofocus>
      <button class="btn-glass" id="searchBtn" onclick="runQuery()">Find Fonts</button>
    </div>
  </div>

  <div class="status" id="status"></div>

  <!-- Results -->
  <div class="results" id="results"></div>

  <!-- Footer -->
  <div class="footer">
    <div class="footer-brand">The Fontologist</div>
    <div class="footer-sub">AI-powered font intelligence by Equinox Design</div>
  </div>

</div>

<script>
const apiKeyInput = document.getElementById('apiKeyInput');
const saveKeyBtn = document.getElementById('saveKeyBtn');
const queryInput = document.getElementById('queryInput');
const searchBtn = document.getElementById('searchBtn');
const statusEl = document.getElementById('status');
const resultsEl = document.getElementById('results');

// Restore key
const storedKey = sessionStorage.getItem('fontologist_key');
if (storedKey) {
  apiKeyInput.value = storedKey;
  saveKeyBtn.textContent = 'Saved';
  saveKeyBtn.classList.add('saved');
}

function saveKey() {
  const key = apiKeyInput.value.trim();
  if (!key) return;
  sessionStorage.setItem('fontologist_key', key);
  saveKeyBtn.textContent = 'Saved';
  saveKeyBtn.classList.add('saved');
  setTimeout(() => {
    saveKeyBtn.textContent = 'Save Key';
    saveKeyBtn.classList.remove('saved');
  }, 2200);
}

queryInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') runQuery();
});

// The scoring methodology stays hidden — this is the secret sauce.
// User never sees attribute names, framework references, or scoring method.
const SYSTEM_PROMPT = `You are a semantic typography engine trained on the FontCLIP attribute framework (Tatsukawa et al., 2024) and the O'Donovan crowdsourced font attribute dataset (2014).

You operate across 37 typographic attributes divided into two categories:

STRUCTURAL / FORMAL ATTRIBUTES:
serif, sans-serif, italic, cursive, monospace, capitals, display, thin, bold, condensed, extended, geometric, humanist, rounded, angular, high-contrast, low-contrast, decorative, script

PERCEPTUAL / EMOTIONAL ATTRIBUTES (scored 0–100):
friendly, warm, happy, elegant, dramatic, legible, calm, corporate, playful, feminine, masculine, modern, retro/vintage, luxurious, technical, organic, rigid, delicate, strong, authoritative, trustworthy, creative, formal, casual, energetic

For each input word or phrase:

1. Internally score the word across all 37 attributes, identifying the 5–8 most dominant dimensions.
2. When the input is abstract, emotional, or conceptual, weight perceptual/emotional attributes more heavily than structural ones.
3. Use the dominant attributes to reason toward 5 specific Google Fonts whose typographic character best matches that attribute profile.
4. Choose only real, currently available Google Fonts. Prefer well-known, widely used fonts.

Return ONLY a JSON array of exactly 5 objects. No preamble, no markdown fences, no explanation outside the JSON.

Each object schema:
{
  "name": "<Google Font name exactly as listed on fonts.google.com>",
  "qualities": ["<quality1>", "<quality2>", "<quality3>", "<quality4>", "<quality5>"],
  "rationale": "<One sentence explaining why this typeface suits the input — reference the feeling and character of the font, NOT the scoring method or attributes by name.>",
  "match_strength": {
    "<quality1>": <score 0-100>,
    "<quality2>": <score 0-100>,
    "<quality3>": <score 0-100>
  }
}

IMPORTANT: In "qualities" and "rationale", use natural descriptive language — words like "refined", "grounded", "fluid", "structured", etc. Do NOT use technical attribute names from the scoring system. The user should feel like they're getting expert typographic intuition, not a technical readout.

Include only the top 3–5 match strengths that drove the selection.

Return ONLY the JSON array. Nothing else.`;

async function runQuery() {
  const key = sessionStorage.getItem('fontologist_key');
  if (!key) {
    statusEl.textContent = 'Enter your API key first';
    statusEl.className = 'status error';
    return;
  }

  const query = queryInput.value.trim();
  if (!query) return;

  searchBtn.disabled = true;
  statusEl.textContent = 'Reading the meaning\u2026';
  statusEl.className = 'status';
  resultsEl.innerHTML = '';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2048,
        system: SYSTEM_PROMPT,
        messages: [{ role: 'user', content: query }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || 'API error ' + response.status);
    }

    const data = await response.json();
    const text = data.content?.[0]?.text;
    if (!text) throw new Error('Empty response.');

    let fonts;
    try {
      fonts = JSON.parse(text);
    } catch {
      const match = text.match(/\[[\s\S]*\]/);
      if (match) fonts = JSON.parse(match[0]);
      else throw new Error('Could not parse recommendations.');
    }

    if (!Array.isArray(fonts) || fonts.length === 0) {
      throw new Error('No recommendations returned.');
    }

    statusEl.textContent = fonts.length + ' typefaces for \u201c' + escapeHTML(query) + '\u201d';
    renderResults(fonts, query);

  } catch (err) {
    statusEl.textContent = err.message;
    statusEl.className = 'status error';
  } finally {
    searchBtn.disabled = false;
  }
}

function renderResults(fonts, query) {
  resultsEl.innerHTML = '';

  fonts.forEach((font, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    const fontFamily = font.name;
    const fontId = 'font-' + i;
    const attrId = 'attr-' + i;

    // Use "match_strength" (hidden scoring) for the bar chart
    const scores = font.match_strength || font.attribute_scores || {};
    let barsHTML = '';
    for (const [label, score] of Object.entries(scores)) {
      barsHTML += '<div class="attr-bar-row">'
        + '<div class="attr-bar-label">' + escapeHTML(label) + '</div>'
        + '<div class="attr-bar-track"><div class="attr-bar-fill" style="width:' + score + '%"></div></div>'
        + '<div class="attr-bar-value">' + score + '</div>'
        + '</div>';
    }

    // Use "qualities" (natural language) for pills
    const qualities = font.qualities || font.dominant_attributes || [];
    const pills = qualities
      .map(a => '<span class="pill">' + escapeHTML(a) + '</span>')
      .join('');

    card.innerHTML = '<div class="card-specimen">'
      + '<div class="word loading" id="' + fontId + '" style="font-family:\'' + fontFamily + '\',sans-serif">' + escapeHTML(query) + '</div>'
      + '</div>'
      + '<div class="card-body">'
      + '<div class="card-name">' + escapeHTML(fontFamily) + '</div>'
      + '<div class="card-rationale">' + escapeHTML(font.rationale || '') + '</div>'
      + '<div class="card-pills">' + pills + '</div>'
      + '<button class="attr-toggle" onclick="toggleAttr(this,\'' + attrId + '\')">'
      + '<span class="arrow">&#9654;</span> Match detail</button>'
      + '<div class="attr-profile" id="' + attrId + '">' + barsHTML + '</div>'
      + '</div>';

    resultsEl.appendChild(card);
    loadFont(fontFamily, fontId);
  });
}

function loadFont(fontName, elementId) {
  const el = document.getElementById(elementId);
  const encoded = fontName.replace(/ /g, '+');
  const link = document.createElement('link');
  link.rel = 'stylesheet';
  link.href = 'https://fonts.googleapis.com/css2?family=' + encoded + ':wght@400;700&display=swap';
  link.onload = () => document.fonts.ready.then(() => el.classList.remove('loading'));
  link.onerror = () => {
    el.classList.remove('loading');
    el.innerHTML = '<span class="font-error">Font \u201c' + fontName + '\u201d could not be loaded</span>';
  };
  document.head.appendChild(link);
  setTimeout(() => el.classList.remove('loading'), 4000);
}

function toggleAttr(btn, id) {
  const profile = document.getElementById(id);
  btn.classList.toggle('open');
  profile.classList.toggle('open');
}

function escapeHTML(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}
</script>

</body>
</html>
